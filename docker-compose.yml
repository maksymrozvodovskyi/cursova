services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: pc_builder
      POSTGRES_PASSWORD: pc_builder_pass
      POSTGRES_DB: pc_builder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env

volumes:
  postgres_data:
